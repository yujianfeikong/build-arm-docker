name: build-kkfileview-arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build kkFileView 5.0.0 ARM64 image tar
        env:
          IMAGE_TAR_PATH: ${{ runner.temp }}/kkfileview-arm64-v5.0.0.tar.gz
          LOCAL_PROGRESS: plain
        run: |
          chmod +x ./build-and-run-arm64.sh
          ./build-and-run-arm64.sh \
            --env-file examples/kkfileview-5.0.0.env

      - name: Upload image tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: kkfileview-arm64-v5.0.0-image-tar
          path: ${{ runner.temp }}/kkfileview-arm64-v5.0.0.tar.gz
          if-no-files-found: error
          retention-days: 7
