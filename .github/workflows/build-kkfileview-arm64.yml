name: build-kkfileview-arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build kkFileView 5.0.0 ARM64 image
        run: |
          chmod +x ./build-and-run-arm64.sh
          ./build-and-run-arm64.sh \
            --env-file examples/kkfileview-5.0.0.env
